<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TVRoboPhetta - Phetta's House</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ────────────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a0a2e; }

    /* ── Canvas ──────────────────────────────────────────────── */
    canvas#game { display: block; width: 100%; height: 100%; }

    /* ── Screen overlay base ─────────────────────────────────── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 20;
      font-family: 'Fredoka', 'Segoe UI', sans-serif;
      transition: opacity 0.5s ease;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ── Loading Screen ──────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a0a2e; color: #ffd9a0;
      font-family: 'Fredoka', 'Segoe UI', sans-serif;
      font-size: 1.4rem;
      z-index: 30;
      transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #loading .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255, 217, 160, 0.2);
      border-top-color: #ffd9a0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }

    .loading-bar-outer {
      width: 240px; height: 6px;
      background: rgba(255, 217, 160, 0.15);
      border-radius: 3px;
      overflow: hidden;
    }
    .loading-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #ffa94d, #ffd9a0);
      border-radius: 3px;
      animation: loading-pulse 1.5s ease-in-out infinite;
    }
    @keyframes loading-pulse {
      0%, 100% { width: 30%; }
      50% { width: 80%; }
    }

    /* ── Title Screen ────────────────────────────────────────── */
    #title-screen {
      background: radial-gradient(ellipse at center, transparent 30%, rgba(10, 5, 20, 0.7) 100%);
    }

    .title-content {
      text-align: center;
      animation: title-enter 1.2s ease-out;
    }

    .title-logo {
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
      animation: title-glow 3s ease-in-out infinite;
    }

    .title-tv {
      color: #7fd4a0;
      text-shadow:
        0 0 30px rgba(127, 212, 160, 0.4),
        0 4px 12px rgba(0, 0, 0, 0.4);
    }
    .title-robo {
      color: #ffe4b5;
      text-shadow:
        0 0 30px rgba(255, 228, 181, 0.4),
        0 4px 12px rgba(0, 0, 0, 0.4);
    }
    .title-phetta {
      color: #ffa94d;
      text-shadow:
        0 0 30px rgba(255, 169, 77, 0.4),
        0 4px 12px rgba(0, 0, 0, 0.4);
    }

    .title-subtitle {
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 400;
      color: rgba(255, 217, 160, 0.7);
      letter-spacing: 0.1em;
      margin-bottom: 3rem;
    }

    .press-start {
      font-size: 1.2rem;
      font-weight: 600;
      color: #ffd9a0;
      animation: pulse 2s ease-in-out infinite;
      letter-spacing: 0.1em;
    }

    .version {
      position: absolute;
      bottom: 1.5rem;
      right: 1.5rem;
      font-size: 0.8rem;
      color: rgba(255, 217, 160, 0.3);
    }

    @keyframes title-enter {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes title-glow {
      0%, 100% { filter: brightness(1); }
      50%      { filter: brightness(1.2); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }

    /* ── Menu Screen ─────────────────────────────────────────── */
    #menu-screen {
      background: radial-gradient(ellipse at center, transparent 30%, rgba(10, 5, 20, 0.7) 100%);
    }

    .menu-panel {
      background: rgba(30, 18, 50, 0.88);
      border-radius: 24px;
      padding: 2.5rem 3rem;
      border: 2px solid rgba(255, 217, 160, 0.2);
      box-shadow:
        0 12px 40px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      min-width: 320px;
      animation: menu-enter 0.5s ease-out;
    }
    @keyframes menu-enter {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .menu-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #ffe4b5;
      text-align: center;
      margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
    }

    .menu-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255, 217, 160, 0.3), transparent);
      margin: 1rem 0 1.5rem;
    }

    .menu-items {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-family: 'Fredoka', 'Segoe UI', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: #ffd9a0;
      background: transparent;
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 0.8rem 1.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }
    .menu-item:hover,
    .menu-item:focus-visible {
      background: rgba(255, 169, 77, 0.12);
      border-color: rgba(255, 169, 77, 0.3);
      transform: translateX(4px);
      outline: none;
    }
    .menu-item:active {
      transform: translateX(4px) scale(0.98);
    }
    .menu-item.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    .menu-icon {
      font-size: 0.9rem;
      color: rgba(255, 169, 77, 0.7);
    }

    /* ── Settings ────────────────────────────────────────────── */
    #settings-screen {
      background: radial-gradient(ellipse at center, transparent 30%, rgba(10, 5, 20, 0.7) 100%);
    }
    .settings-panel { min-width: 360px; }

    .settings-content {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.1rem;
      color: #ffd9a0;
      padding: 0.5rem 0;
    }
    .settings-value {
      color: rgba(255, 217, 160, 0.6);
      font-size: 1rem;
    }

    /* ── Intro Overlay ───────────────────────────────────────── */
    #intro-overlay {
      justify-content: flex-end;
      padding-bottom: 3rem;
    }

    #intro-text-box {
      background: rgba(20, 12, 35, 0.85);
      border-radius: 16px;
      padding: 1.5rem 2.5rem;
      border: 2px solid rgba(255, 217, 160, 0.15);
      max-width: 600px;
      text-align: center;
      transition: opacity 0.4s ease;
    }

    #intro-text {
      font-size: 1.2rem;
      font-weight: 400;
      color: #ffe4b5;
      line-height: 1.6;
      white-space: pre-line;
    }

    .intro-skip {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      font-size: 0.85rem;
      color: rgba(255, 217, 160, 0.4);
      font-family: 'Fredoka', 'Segoe UI', sans-serif;
    }

    /* ── Gameplay HUD ────────────────────────────────────────── */
    #gameplay-hud {
      pointer-events: none;
      justify-content: flex-end;
      padding-bottom: 2rem;
    }

    #click-prompt {
      color: #ffd9a0;
      font-size: 1rem;
      opacity: 0.8;
      transition: opacity 0.3s;
      letter-spacing: 0.03em;
    }
    #click-prompt.hidden { opacity: 0; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Loading Screen -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading Phetta's House...</div>
    <div class="loading-bar-outer">
      <div class="loading-bar-inner"></div>
    </div>
  </div>

  <!-- Title Screen -->
  <div id="title-screen" class="screen hidden">
    <div class="title-content">
      <div class="title-logo">
        <span class="title-tv">TV</span><span class="title-robo">Robo</span><span class="title-phetta">Phetta</span>
      </div>
      <div class="title-subtitle">~ Phetta's House ~</div>
    </div>
    <div class="press-start">Press Any Key</div>
    <div class="version">v0.1</div>
  </div>

  <!-- Menu Screen -->
  <div id="menu-screen" class="screen hidden">
    <div class="menu-panel">
      <div class="menu-title">TVRoboPhetta</div>
      <div class="menu-divider"></div>
      <div class="menu-items">
        <button class="menu-item" data-action="new-game">
          <span class="menu-icon">&#9654;</span> New Game
        </button>
        <button class="menu-item" data-action="continue" id="btn-continue">
          <span class="menu-icon">&#9654;</span> Continue
        </button>
        <button class="menu-item" data-action="settings">
          <span class="menu-icon">&#9881;</span> Settings
        </button>
      </div>
    </div>
  </div>

  <!-- Settings Screen -->
  <div id="settings-screen" class="screen hidden">
    <div class="menu-panel settings-panel">
      <div class="menu-title">Settings</div>
      <div class="menu-divider"></div>
      <div class="settings-content">
        <div class="settings-row">
          <span>Move</span>
          <span class="settings-value">W A S D</span>
        </div>
        <div class="settings-row">
          <span>Look</span>
          <span class="settings-value">Mouse</span>
        </div>
        <div class="settings-row">
          <span>Jump</span>
          <span class="settings-value">Space</span>
        </div>
      </div>
      <button class="menu-item" data-action="back">
        <span class="menu-icon">&#9664;</span> Back
      </button>
    </div>
  </div>

  <!-- Intro Overlay -->
  <div id="intro-overlay" class="screen hidden">
    <div id="intro-text-box">
      <p id="intro-text"></p>
    </div>
    <div class="intro-skip">Press ESC or Click to skip</div>
  </div>

  <!-- Gameplay HUD -->
  <div id="gameplay-hud" class="screen hidden">
    <div id="click-prompt">Click to look around &mdash; WASD to move &mdash; Space to jump</div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
