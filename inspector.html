<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>House Model Inspector - TVRoboPhetta</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; }
    #app { display: flex; height: 100%; }
    #sidebar {
      width: 360px; min-width: 360px; background: #16213e;
      display: flex; flex-direction: column; border-right: 1px solid #333;
    }
    #sidebar h2 { padding: 12px 16px; background: #0f3460; font-size: 1rem; }
    #search-box {
      margin: 8px; padding: 8px 12px; border: 1px solid #444; border-radius: 4px;
      background: #1a1a2e; color: #e0e0e0; font-size: 0.85rem;
    }
    #obj-list { flex: 1; overflow-y: auto; padding: 4px; }
    .obj-item {
      padding: 6px 12px; cursor: pointer; border-radius: 4px;
      font-size: 0.8rem; margin-bottom: 2px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .obj-item:hover { background: #1f3a60; }
    .obj-item.active { background: #0f3460; color: #4a9eff; }
    .obj-item.hidden-obj { opacity: 0.4; }
    .obj-type {
      font-size: 0.65rem; padding: 1px 6px; border-radius: 10px;
      background: #4a9eff22; color: #4a9eff;
    }
    .obj-type.mesh { background: #4caf5022; color: #4caf50; }
    .obj-type.group { background: #ff980022; color: #ff9800; }
    #obj-count { padding: 4px 16px; font-size: 0.75rem; color: #888; border-top: 1px solid #333; }
    #viewport { flex: 1; position: relative; }
    canvas#preview { display: block; width: 100%; height: 100%; }
    #info-panel {
      position: absolute; top: 12px; left: 12px; right: 12px;
      pointer-events: none;
    }
    #selected-info {
      background: #000a; padding: 10px 14px; border-radius: 6px;
      font-size: 0.8rem; pointer-events: auto; max-width: 500px;
      line-height: 1.5;
    }
    #controls-panel {
      position: absolute; bottom: 12px; left: 12px; right: 12px;
      background: #000a; padding: 10px 14px; border-radius: 6px;
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    #controls-panel button {
      padding: 5px 12px; border: 1px solid #555; border-radius: 4px;
      background: #1a1a2e; color: #e0e0e0; cursor: pointer; font-size: 0.8rem;
    }
    #controls-panel button:hover { background: #0f3460; border-color: #4a9eff; }
    #controls-panel button.active { background: #0f3460; border-color: #4a9eff; color: #4a9eff; }
    #export-btn {
      margin-left: auto; padding: 5px 14px;
      border: 1px solid #4caf50; border-radius: 4px;
      background: #1b5e20; color: #a5d6a7; cursor: pointer; font-size: 0.8rem;
    }
    #loading-overlay {
      position: fixed; inset: 0; background: #1a1a2eee; display: flex;
      align-items: center; justify-content: center; z-index: 100;
      font-size: 1.2rem; flex-direction: column; gap: 12px;
    }
    #loading-overlay.hidden { display: none; }
    .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #4a9eff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Loading house model...</div>
  </div>
  <div id="app">
    <div id="sidebar">
      <h2>House Model Inspector</h2>
      <input id="search-box" type="text" placeholder="Search objects..." />
      <div id="obj-list"></div>
      <div id="obj-count">0 objects</div>
    </div>
    <div id="viewport">
      <canvas id="preview"></canvas>
      <div id="info-panel">
        <div id="selected-info">Click an object in the list or in the 3D view to inspect it.</div>
      </div>
      <div id="controls-panel">
        <button id="show-all-btn" class="active">Show All</button>
        <button id="isolate-btn">Isolate Selected</button>
        <button id="wireframe-btn">Wireframe</button>
        <button id="reset-cam-btn">Reset Camera</button>
        <button id="export-btn">Export Selected as GLB</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/inspector.js"></script>
</body>
</html>
